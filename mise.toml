[tools]
node = 'lts'
"npm:pnpm" = 'latest'
"npm:firebase-tools" = 'latest'

[env]
_.path = ['{{config_root}}/node_modules/.bin']

[shell_alias]
m = 'mise run'
i = 'mise run install'
l = 'mise run lint'
d = 'mise run dev'
v = 'mise run verify'
D = 'mise run deploy'

ll = 'ls -l'
la = 'ls -A'

g = 'git'
gb = 'git branch'
go = 'git checkout'
gd = 'git diff'
gs = 'git status'
ga = 'git add'
gc = 'git commit'
gp = 'git push'

[tasks.install]
alias = 'i'
description = 'Installs dependencies with pnpm'
run = 'pnpm install'
sources = ['package.json', 'pnpm-lock.yaml', 'mise.toml']
outputs = ['node_modules/.pnpm/lock.yaml']

[tasks.format]
alias = 'f'
description = 'Format code'
run = 'pnpm run format'
depends = ['install']

[tasks.lint]
alias = 'l'
description = 'Run ESLint'
run = 'pnpm run lint'
depends = ['format']

[tasks.build]
alias = 'b'
description = 'Build the project'
run = 'pnpm run build'
depends = ['install']

[tasks.typecheck]
alias = 'tc'
description = 'Run TypeScript typecheck'
run = 'tsc --noEmit'
depends = ['install']

[tasks.verify]
alias = 'v'
description = 'Verify the project (lint, typecheck, build)'
depends = ['lint', 'typecheck', 'build']

[tasks.dev]
alias = ['d', 'local']
description = 'Start development server'
run = 'pnpm run dev'
depends = ['install', 'lint']

[tasks.deploy]
description = 'Deploy to Firebase'
run = 'NEXT_EXPORT=true pnpm run build && firebase deploy --only hosting'
depends = ['install']

[tasks.clean]
description = 'Clean build artifacts'
run = 'rm -rf node_modules .next out'
